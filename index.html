<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to PDF コンバーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/svg2pdf.js/2.2.2/svg2pdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .container { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; display: inline-block; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SVGをPDFに変換</h1>
        <p>SVGファイルを選択してください</p>
        <input type="file" id="svgInput" accept=".svg">
        <br>
        <button id="convertBtn">PDFに変換してダウンロード</button>
    </div>

    <script>
        document.getElementById('convertBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('svgInput');
            
            if (fileInput.files.length === 0) {
                alert('SVGファイルを選択してください。');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const svgContent = e.target.result;
                    
                    const parser = new DOMParser();
                    const svgDoc = parser.parseFromString(svgContent, "image/svg+xml");
                    const svgElement = svgDoc.documentElement;
                    
                    if (svgElement.tagName.toLowerCase() !== 'svg') {
                        throw new Error("有効なSVGファイルではありません。");
                    }

                    document.body.appendChild(svgElement);
                    svgElement.style.position = 'absolute';
                    svgElement.style.visibility = 'hidden';

                    // ★改良ポイント：どんなSVGでもサイズを安全に読み取るようにしました
                    let width = 500;
                    let height = 500;
                    
                    const viewBox = svgElement.getAttribute('viewBox');
                    if (viewBox) {
                        const parts = viewBox.split(/\s*,*\s+/);
                        if (parts.length >= 4) {
                            width = parseFloat(parts[2]);
                            height = parseFloat(parts[3]);
                        }
                    } else {
                        const wAttr = svgElement.getAttribute('width');
                        const hAttr = svgElement.getAttribute('height');
                        if (wAttr) width = parseFloat(wAttr);
                        if (hAttr) height = parseFloat(hAttr);
                    }

                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({
                        orientation: width > height ? 'l' : 'p',
                        unit: 'pt',
                        format: [width, height]
                    });

                    await doc.svg(svgElement, {
                        x: 0,
                        y: 0,
                        width: width,
                        height: height
                    });

                    document.body.removeChild(svgElement);

                    doc.save('converted.pdf');
                    
                } catch (error) {
                    // ★改良ポイント：エラーが起きたら画面にお知らせを出すようにしました
                    console.error(error);
                    alert("エラーが発生しました: " + error.message);
                }
            };

            reader.readAsText(file);
        });
    </script>

</body>
</html>
